<!DOCTYPE html>
<html>

<head>

    <title>Login - AI Medical Assistant</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>🩺 AI Medical Assistant</h1>

    <h2>Login</h2>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email"
            required>

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <p>
        New User?
        <a href="/register">Create Account</a>
    </p>

</div>

</body>

</html>
