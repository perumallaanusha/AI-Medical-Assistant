<!DOCTYPE html>
<html>

<head>
    <title>Register - AI Medical Assistant</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🩺 AI Medical Assistant</h1>

    <h2>Create Account</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required>

        <br><br>

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required>

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <br><br>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <p>
        Already have an account?
        <a href="/login">Login Here</a>
    </p>

</div>

</body>

</html>
